name: Render PUML diagrams

on:
  push:
    branches-ignore:
      - main
    paths:
      - '**/*.puml'
      - 'render-puml.sh'
      - '.github/workflows/render-puml.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render diagrams
        run: |
          docker run --rm \
            -v "$PWD:/data" -w /data \
            --entrypoint /bin/bash \
            plantuml/plantuml:1.2026.6 \
            /data/render-puml.sh

      - name: Commit rendered PNGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: regenerate PUML diagrams [skip ci]'
          file_pattern: '*.png **/*.png'
